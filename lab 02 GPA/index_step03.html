<!DOCTYPE html >
<html lang="en">
<head >
<metacharset="UTF -8">
<title >GPA Calculator with jQuery and Bootstrap </title >
<!-- BootstrapCSS -->
<link rel="stylesheet" href="https :// stackpath.bootstrapcdn.com/
bootstrap /4.5.2/ css/bootstrap.min.css">
<link rel="stylesheet" href="style.css">
<!-- jQuery-->
<script src="https :// code.jquery.com/jquery -3.6.0. min.js"></script >
<!-- Bootstrap JS -->
<script src="https :// stackpath.bootstrapcdn.com/bootstrap/
4.5.2/ js/bootstrap.min.js"></script >
<script src="script.js" defer ></script >
</head >
<body >
<div class="container">
<h1 class="mt -5">GPACalculator </h1>
<div id="result" class="mt -3"></div>
<form id="gpaForm" class="mt -3">
<div id="courses">
<div class="course -row form -row mb -2">
<div class="col">
<inputtype="text" name="course []" class="form -control"
placeholder="Coursename" required >
</div>
<div class="col -2">
<inputtype="number" name="credits []" class="form -control"
placeholder="Credits" min="1" required >
</div>
<div class="col -2">
<selectname="grade []" class="form -control">
<optionvalue="4.0">A</option >
<optionvalue="3.0">B</option >
<optionvalue="2.0">C</option >
<optionvalue="1.0">D</option >
<optionvalue="0.0">F</option >
</select >
</div>
</div>
</div>
<buttontype="button" id="addCourse"
class="btn btn -secondary mb -3">
+ Add Course
</button ><br>
<buttontype="submit" class="btn btn -primary">
CalculateGPA
</button >
</form >
</div>
</body >
</html >
